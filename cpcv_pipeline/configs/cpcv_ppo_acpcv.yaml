# PPO + Adaptive CPCV (RSI) — HPO Configuration
# Matches the winning ACPCV-RSI config from training experiments.
#
# Usage:
#   Single run:  python cpcv_pipeline/hpo_cpcv.py --config-name=cpcv_ppo_acpcv
#   HPO sweep:   python cpcv_pipeline/hpo_cpcv.py -m --config-name=cpcv_ppo_acpcv
#   Resume HPO:  python cpcv_pipeline/hpo_cpcv.py -m --config-name=cpcv_ppo_acpcv ++trial_offset=auto
#
# NOTE: GPU memory is auto-scaled by hpo_cpcv.py (same as function_train_test.py)

defaults:
  - _self_
  - search_space: ppo_space
  - override hydra/sweeper: HyperSMAC

# Agent
agent: ppo
gpu_id: 0

# Cross-validation — Adaptive CPCV with RSI feature
cv_method: acpcv
n_groups: 5           # CPCV N
n_test_groups: 2      # CPCV K → C(5,2) = 10 splits
embargo_days: 7
test_ratio: 0.2       # held-out test fraction (final OOS evaluation)

# Adaptive CPCV parameters (RSI — matches winning config)
acpcv_feature: rsi
acpcv_window: 30      # RSI window (uses tech_ary RSI-30 column)
n_subsplits: 3
lower_quantile: 0.25
upper_quantile: 0.75

# Training
seed: 1943
break_step: 500000

# Environment — auto-scaled by GPU memory scaler
num_envs: 896

# Hyperparameters (defaults — overridden by search space)
learning_rate: 1e-4
gamma: 0.995          # matches winning ACPCV-RSI config
net_arch: "small"     # small=[64,64], medium=[256,128], large=[512,256]
batch_size: 512
repeat_times: 16

# PPO-specific
ratio_clip: 0.25
lambda_gae_adv: 0.95
lambda_entropy: 0.01
clip_grad_norm: 3.0
if_use_v_trace: true

# VecNormalize — obs-only normalization (matches winning config)
use_vec_normalize: true
norm_obs: true
norm_reward: false

# Process control
# num_workers: omit to let train_split() auto-compute from CPU count
# (matching optimize_adapt_cpcv.py behavior). GPU memory scaling is automatic.
cleanup_checkpoints: false

# Trial offset for pbo_returns numbering on restart.
# 0 = fresh run (default), "auto" = continue from last trial, or int.
# Usage on restart:  ++trial_offset=auto  (++ needed because key already exists in this file)
trial_offset: 0

# Instance-based CV intensification: SMAC passes instance ID as override.
# null = legacy mode (train all splits). Set by SMAC Intensifier at runtime.
instance: null

# Number of CPCV splits — C(5,2) = 10. Used in Intensifier max_config_calls.
n_splits: 10

# Hydra sweeper
hydra:
  sweeper:
    search_space: ${search_space}
    # n_trials counts SMAC *iterations*, not unique configs.
    # Each iteration = one (config, instance) eval.  With 10 ACPCV splits
    # and early termination killing bad configs after ~3-4 folds:
    #   200 iterations ≈ 25-35 unique configs evaluated
    #   (vs only ~5-7 configs with n_trials=50)
    # SMAC's Scenario.n_trials is the authoritative limit; Hypersweeper's
    # trials_run counter is a secondary check that resets on resume (safe
    # because SMAC's own counter persists in runhistory.json).
    n_trials: 200
    resume: true
    sweeper_kwargs:
      # seeds: [0, 1, 2]  # Disabled — 1 seed (from YAML seed: 1943) for HPO speed.
      # Multi-seed evaluation should be done post-HPO on the winning config.
      max_parallelization: 0
      maximize: true
      # Weights & Biases observability (logs incumbent, iteration stats)
      wandb_project: elegantrl-hpo
      wandb_entity: docdudeus-equityml
      wandb_tags: [acpcv, ppo, rsi]
      optimizer_kwargs:
        smac_facade:
          _target_: smac.facade.hyperparameter_optimization_facade.HyperparameterOptimizationFacade
          _partial_: true
        # Intensifier: evaluate configs on individual CV folds (instances).
        # Bad configs are eliminated early after poor performance on 3-4 folds
        # instead of wasting compute on all 10. Matches SMAC3 CV example.
        intensifier:
          _target_: smac.intensifier.intensifier.Intensifier
          _partial_: true
          max_config_calls: ${n_splits}
          seed: 0
        scenario:
          seed: 1493
          n_trials: ${hydra.sweeper.n_trials}
          deterministic: true
          n_workers: 1
          # Each ACPCV fold = one SMAC instance → per-split persistence + early termination
          instances: ["split_0", "split_1", "split_2", "split_3", "split_4", "split_5", "split_6", "split_7", "split_8", "split_9"]
          instance_features:
            "split_0": [0]
            "split_1": [1]
            "split_2": [2]
            "split_3": [3]
            "split_4": [4]
            "split_5": [5]
            "split_6": [6]
            "split_7": [7]
            "split_8": [8]
            "split_9": [9]
          output_directory: ${hydra.sweep.dir}
        smac_kwargs:
          dask_client: null
          overwrite: false
  run:
    dir: ./tmp/hpo_acpcv_ppo/
  sweep:
    dir: ./tmp/hpo_acpcv_ppo/